<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semakan Anugerah | Ihtifal SMIH 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .kad-semakan {
            max-width: 500px;
            margin: auto;
            border-radius: 15px;
            overflow: hidden;
        }
        .header-kad {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .btn-hadir { background-color: #198754; color: white; border: none; }
        .btn-hadir:hover { background-color: #157347; color: white; }
        .btn-tidak { background-color: #dc3545; color: white; border: none; }
        .btn-tidak:hover { background-color: #bb2d3b; color: white; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="card shadow-lg kad-semakan border-0">
        
        <div class="header-kad">
            <h2 class="fw-bold mb-1">🎓 Ihtifal SMIH 2026</h2>
            <p class="mb-0 text-light opacity-75">Portal Semakan & RSVP Penerima Anugerah</p>
        </div>

        <div class="card-body p-4 p-md-5">
            
            <div id="bahagian-carian">
                <label class="form-label text-muted fw-bold">Sila masukkan Nombor Kad Pengenalan:</label>
                <div class="input-group input-group-lg mb-3 shadow-sm rounded">
                    <input type="text" id="no_ic" class="form-control" placeholder="Contoh: 012345678910" onkeypress="jikaEnter(event)" autofocus>
                </div>
                <button class="btn btn-primary btn-lg w-100 shadow-sm fw-bold" onclick="semakIC()">Semak Kelayakan 🔍</button>
            </div>

            <div id="bahagian-keputusan" class="mt-4" style="display: none;">
                </div>

        </div>
    </div>
    
    <div class="text-center mt-4 text-muted small">
        &copy; 2026 Hak Cipta Terpelihara Urusetia Ihtifal SMIH.
    </div>
</div>

<script>
    function jikaEnter(e) {
        if (e.key === 'Enter') semakIC();
    }

    async function semakIC() {
        const no_ic = document.getElementById('no_ic').value.trim();
        const divKeputusan = document.getElementById('bahagian-keputusan');
        
        if(!no_ic) {
            alert("Sila masukkan No Kad Pengenalan anda.");
            return;
        }

        // Tunjuk status loading
        divKeputusan.style.display = 'block';
        divKeputusan.innerHTML = `<div class="text-center text-primary spinner-border" role="status"></div><p class="text-center mt-2 text-muted">Sedang menyemak...</p>`;

        try {
            const response = await fetch(`/api/semak/${no_ic}`);
            const result = await response.json();

            if (result.success) {
                const p = result.data;
                
                // Jika berjaya, paparkan kad maklumat pelajar
                divKeputusan.innerHTML = `
                    <div class="alert alert-success border-0 shadow-sm">
                        <h4 class="alert-heading fw-bold mb-1">Tahniah! 🎉</h4>
                        <p class="mb-0">${p.nama_pelajar}</p>
                    </div>
                    
                    <ul class="list-group list-group-flush mb-4 shadow-sm rounded">
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-muted">Kelas</span>
                            <span class="fw-bold">${p.kelas_pelajar || '-'}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-muted">Anugerah</span>
                            <span class="badge bg-primary rounded-pill fs-6">${p.nama_anugerah}</span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="text-muted">Waktu Naik Pentas</span>
                            <span class="fw-bold text-dark">${p.waktu_anugerah}</span>
                        </li>
                    </ul>

                    <div class="text-center p-3 bg-light rounded shadow-sm border">
                        <p class="fw-bold text-dark mb-3">Adakah anda akan hadir ke majlis ini?</p>
                        <div class="d-grid gap-2 d-md-block">
                            <button class="btn btn-hadir btn-lg px-4 me-md-2" onclick="hantarRSVP('${p.no_ic}', 'Hadir')">Ya, Saya Hadir ✓</button>
                            <button class="btn btn-tidak btn-lg px-4" onclick="hantarRSVP('${p.no_ic}', 'Tidak Hadir')">Maaf, Tidak Hadir ✗</button>
                        </div>
                    </div>
                `;
            } else {
                // Jika IC tiada dalam database
                divKeputusan.innerHTML = `
                    <div class="alert alert-danger border-0 shadow-sm text-center">
                        <h5 class="fw-bold mb-2">Harap Maaf 😔</h5>
                        <p class="mb-0">${result.message}</p>
                        <button class="btn btn-outline-danger btn-sm mt-3" onclick="location.reload()">Cuba Semula</button>
                    </div>
                `;
            }
        } catch (error) {
            console.error(error);
            divKeputusan.innerHTML = `<div class="alert alert-warning text-center">Terdapat ralat pada sistem. Sila cuba sebentar lagi.</div>`;
        }
    }

    async function hantarRSVP(ic, status) {
        try {
            const response = await fetch('/api/rsvp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ no_ic: ic, status: status })
            });

            const result = await response.json();
            const divKeputusan = document.getElementById('bahagian-keputusan');

            if (result.success) {
                // Berjaya hantar RSVP
                divKeputusan.innerHTML = `
                    <div class="alert alert-info border-0 shadow-sm text-center py-4">
                        <h1 class="mb-3">✅</h1>
                        <h5 class="fw-bold text-dark">Terima Kasih!</h5>
                        <p class="text-muted mb-4">Maklum balas anda telah direkodkan sebagai: <br><strong class="fs-5 text-primary">${status}</strong></p>
                        <button class="btn btn-outline-primary" onclick="location.reload()">Kembali ke Halaman Utama</button>
                    </div>
                `;
            } else {
                alert("Ralat: " + result.message);
            }
        } catch (error) {
            console.error(error);
            alert("Ralat menghantar maklumat.");
        }
    }
</script>
</body>
</html>
