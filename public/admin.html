<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin | Ihtifal SMIH 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .table-hover tbody tr:hover { background-color: #f1f8ff; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">⚙️ Admin Ihtifal SMIH</a>
        <span class="navbar-text text-light">Papan Pemuka Urusetia</span>
    </div>
</nav>

<div class="container py-4">
    <div class="card shadow-sm mb-4 border-0">
        <div class="card-body">
            <h5 class="card-title fw-bold text-dark mb-3">1. Pengurusan Data (CSV)</h5>
            <div class="input-group w-75">
                <input type="file" class="form-control" id="failCsv" accept=".csv">
                <button class="btn btn-success fw-bold" onclick="muatNaikCSV()">Muat Naik Baharu ⬆️</button>
                <button class="btn btn-danger fw-bold" onclick="padamSemuaData()">🗑 Padam Semua Data</button>
            </div>
            <small class="text-muted mt-2 d-block">Pastikan tajuk baris pertama CSV dieja tepat: <strong>Nama, IC, Kelas, Anugerah, Waktu</strong></small>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <h5 class="card-title fw-bold text-dark mb-3">2. Pangkalan Data Pelajar</h5>
            
            <div class="row g-2 mb-3 bg-light p-2 border rounded shadow-sm">
                <div class="col-md-3">
                    <input type="text" id="filterNama" class="form-control form-control-sm" placeholder="🔍 Cari Nama..." onkeyup="saringData()">
                </div>
                <div class="col-md-2">
                    <input type="text" id="filterKelas" class="form-control form-control-sm" placeholder="Cari Kelas..." onkeyup="saringData()">
                </div>
                <div class="col-md-3">
                    <select id="filterKategori" class="form-select form-select-sm" onchange="saringData()">
                        <option value="">Semua Anugerah</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="filterRsvp" class="form-select form-select-sm" onchange="saringData()">
                        <option value="">Semua RSVP</option>
                        <option value="Hadir">Hadir</option>
                        <option value="Tidak Hadir">Tidak Hadir</option>
                        <option value="Belum Maklumbalas">Belum Maklumbalas</option>
                    </select>
                </div>
                <div class="col-md-2 text-end">
                    <button class="btn btn-outline-secondary btn-sm w-100" onclick="susunData('waktu_anugerah')">Susun Masa ⏱</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>No</th>
                            <th>Nama Pelajar</th>
                            <th>No IC</th>
                            <th>Kelas</th>
                            <th>Anugerah</th>
                            <th>Waktu Pentas</th>
                            <th>Status RSVP</th>
                        </tr>
                    </thead>
                    <tbody id="badan-jadual">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let dataGlobal = [];

    window.onload = () => muatSenaraiPelajar();

    async function muatSenaraiPelajar() {
        try {
            const res = await fetch('/api/admin/pelajar');
            const result = await res.json();
            if (result.success) {
                dataGlobal = result.data;
                kemaskiniDropdown(); 
                paparJadual(dataGlobal);
            }
        } catch (error) {
            console.error(error);
            alert("Gagal memuat turun data.");
        }
    }

    function kemaskiniDropdown() {
        const dropdownKategori = document.getElementById('filterKategori');
        const nilaiPilihan = dropdownKategori.value;
        const senaraiKategori = new Set();
        
        dataGlobal.forEach(p => {
            if(p.nama_anugerah && p.nama_anugerah !== 'null' && p.nama_anugerah.trim() !== '') {
                senaraiKategori.add(p.nama_anugerah);
            }
        });

        let htmlKategori = '<option value="">Semua Anugerah</option>';
        senaraiKategori.forEach(k => {
            htmlKategori += `<option value="${k}">${k}</option>`;
        });
        
        dropdownKategori.innerHTML = htmlKategori;
        if(nilaiPilihan) dropdownKategori.value = nilaiPilihan;
    }

    function paparJadual(data) {
        const tbody = document.getElementById('badan-jadual');
        let html = '';
        
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">Tiada rekod. Sila muat naik fail CSV.</td></tr>`;
            return;
        }

        data.forEach((p, index) => {
            let lencanaRSVP = '';
            if (p.status_rsvp === 'Hadir') lencanaRSVP = '<span class="badge bg-success">Hadir</span>';
            else if (p.status_rsvp === 'Tidak Hadir') lencanaRSVP = '<span class="badge bg-danger">Tidak Hadir</span>';
            else lencanaRSVP = '<span class="badge bg-secondary">Belum Maklumbalas</span>';

            html += `
                <tr>
                    <td>${index + 1}</td>
                    <td class="fw-bold">${p.nama_pelajar || '-'}</td>
                    <td>${p.no_ic || '-'}</td>
                    <td>${p.kelas_pelajar || '-'}</td>
                    <td>${p.nama_anugerah || '-'}</td>
                    <td class="text-danger fw-bold">${p.waktu_anugerah || '-'}</td>
                    <td>${lencanaRSVP}</td>
                </tr>
            `;
        });
        
        tbody.innerHTML = html;
    }

    async function muatNaikCSV() {
        const failInput = document.getElementById('failCsv');
        if (!failInput.files[0]) {
            alert("Sila pilih fail CSV dahulu!");
            return;
        }

        const formData = new FormData();
        formData.append('file', failInput.files[0]);

        try {
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            
            if (result.success) {
                alert("✅ " + result.message);
                failInput.value = ''; 
                muatSenaraiPelajar(); 
            } else {
                alert("❌ Ralat: " + result.error);
            }
        } catch (error) {
            console.error(error);
            alert("Berlaku ralat semasa muat naik.");
        }
    }

    async function padamSemuaData() {
        const sahkan = confirm("AWAS! Adakah anda pasti mahu memadam SEMUA rekod pelajar? Tindakan ini tidak boleh dipulihkan.");
        
        if (sahkan) {
            try {
                const response = await fetch('/api/admin/reset', { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    alert("✅ Berjaya: " + result.message);
                    muatSenaraiPelajar(); 
                } else {
                    alert("❌ Ralat dari pelayan: " + result.error);
                }
            } catch (error) {
                console.error("Ralat sistem:", error);
                alert("❌ Gagal berhubung dengan pelayan.");
            }
        }
    }

    function saringData() {
        const fNama = document.getElementById('filterNama').value.toLowerCase();
        const fKelas = document.getElementById('filterKelas').value.toLowerCase();
        const fKategori = document.getElementById('filterKategori').value;
        const fRsvp = document.getElementById('filterRsvp').value;

        const dataDitapis = dataGlobal.filter(p => {
            const nama = (p.nama_pelajar || '').toLowerCase();
            const kelas = (p.kelas_pelajar || '').toLowerCase();
            const kategori = p.nama_anugerah || '';
            const rsvp = p.status_rsvp || 'Belum Maklumbalas';

            return nama.includes(fNama) && 
                   kelas.includes(fKelas) && 
                   (fKategori === "" || kategori === fKategori) &&
                   (fRsvp === "" || rsvp === fRsvp);
        });

        paparJadual(dataDitapis);
    }

    function susunData(kunci) {
        dataGlobal.sort((a, b) => {
            const nilaiA = a[kunci] || '';
            const nilaiB = b[kunci] || '';
            if (nilaiA < nilaiB) return -1;
            if (nilaiA > nilaiB) return 1;
            return 0;
        });
        saringData(); 
    }
</script>
</body>
</html>
